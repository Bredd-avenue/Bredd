<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <title>Login - Bredd</title>
  
  <style type="text/css" media="all">
    :root {
      --blue: #0062BD;
      --light-grey: #F8F9FA;
      --text-grey: #5F6368;
      --white: #FFF;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    @font-face {
      font-family: Poppins;
      src: url(../Assets/Poppins-Medium.ttf);
    }
    @font-face {
      font-family: PoppinsBold;
      src: url(../Assets/Poppins-ExtraBold.ttf);
    }
    @font-face {
      font-family: PoppinsSemiBold;
      src: url(../Assets/Poppins-SemiBold.ttf);
    }
    body {
     background-color: var(--light-grey);
     height: 100vh;
     font-family: Poppins;
     padding: 5px;
    }
    h3.prev {
      display: flex;
      align-items: center;
      padding: 5px;
    }
    main {
      display: grid;
      place-content: center;
      height: 100%;
    }
    section.main {
      text-align: center;
      background-color: var(--white);
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 0 5px lightgray;
    }
    section h1 {
      font-size: 32px;
      font-family: Poppins-SemiBold;
      margin: 8px;
    }
    section p {
      color: var(--text-grey);
      margin: 8px;
    }
    .buttons {
      margin-bottom: 5px;
      background-color: var(--light-grey);
      padding: 2px;
      border-radius: 6px;
      width: 100%;
      display: flex;
      align-items: center;
    }
    .buttons button {
      border: none;
      border-radius: 6px;
      width: 100%;
      padding: 10px 0;
      color: var(--text-grey);
      background-color: transparent;
      font-family: Poppins;
    }
    .buttons button:first-child {
      background-color: var(--white);
      color: var(--blue);
    }
    form {
      text-align: left;
      margin-top: 30px;
    }
    input {
      border: 1px solid black;
      font-size: 18px;
      padding: 3px;
      outline: none;
      background-color: transparent;
    }
    .inputs {
      background-color: var(--light-grey);
      border-radius: 4px;
      margin: 8px 0;
      margin-bottom: 26px;
      padding: 5px;
      border: 1.5px solid lightgrey;
      display: flex;
      gap: 2px;
      justify-content: space-between;
      align-items: center;
      color: var(--text-grey)

    }
    .psw {
      margin-left: calc(100% - 24ch);
      text-align: left;
      text-decoration: none;
      color: var(--blue);
    }
    a {
      text-decoration: none;
      color: var(--blue);
    }
    input[type="submit"] {
      display: block;
      background-color: var(--blue);
      width: 100%;
      text-align: center;
      padding: 12px 0;
      color: var(--white);
      border-radius: 6px;
      font-weight: bolder;
      margin: 10px auto;
      box-shadow: 1px 1px 5px var(--blue);
    }
  </style>
</head>

<body>
  <header>
    <h3 onclick="history.back()" class="prev"><span class="material-symbols-rounded">arrow_back_IOS</span> Back</h3>
  </header>
  
  <main>
    <section class="main">
      <h1>Welcome Back</h1>
      <p>Login to access the management system</p>
      
      <section class="buttons">
        <button type="button">Student</button>
        <button type="button">Teacher</button>
        <button type="button">Admin</button>
      </section>
      
      <form action="login.php" autocomplete="on" accept-charset="utf-8">
     <label for="email">Email or Username</label>
     <section class="inputs">
       <span class="material-symbols-rounded">person</span>
       <input type="email" name="email" id="email" placeholder="e.g johndoe@school.edu" required>
     </section>
     
     <label for="password">Password</label>
     <a href="#" class="psw">Forgot password?</a>
     <section class="inputs">
       <span class="material-symbols-rounded">lock</span>
       <input type="password" name="password" id="password" placeholder="******" required>
       <span class="material-symbols-rounded">visibility</span>
     </section>
     <input type="checkbox" name="checkbox" id="checkbox" style="transform: translateY(3px);">
     <label for="checkbox">Remember me for 30 days</label>
     
     <input type="submit" value="Sign In">
    </form>
    <p>New student or faculty? <a href="#">Request Access</a></p>
    </section>
  </main>
  
  <footer>
    <main-footer>
    </main-footer>
  </footer>
  <script src="Includes/components.js" type="text/javascript" charset="utf-8" defer></script>
</body>

</html>
